<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>インシデント管理ツール</title>
    <link rel="stylesheet" href="./style.css?v=6" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>インシデント管理ツール</h1>
        <p class="brand-sub">MVP · 社内インシデントの起票・追跡</p>
      </div>
      <div class="user-switcher">
        <label class="user-label" for="currentUser">ログインユーザー</label>
        <select id="currentUser" class="user-select" aria-label="ログインユーザーを選択"></select>
      </div>
    </header>

    <nav class="tabs" aria-label="メインメニュー">
      <button type="button" class="tab active" data-tab="dashboard">ダッシュボード</button>
      <button type="button" class="tab" data-tab="list">一覧・検索</button>
      <button type="button" class="tab tab-highlight" data-tab="create">新規起票</button>
      <button type="button" class="tab" data-tab="accounts">アカウント</button>
      <button type="button" class="tab" data-tab="mypage">マイページ</button>
      <button type="button" class="tab" data-tab="notifications">通知</button>
    </nav>

    <main>
      <section id="dashboard" class="panel active"></section>

      <section id="list" class="panel">
        <div id="filters-wrap"></div>
        <div id="incidentTableWrap"></div>
      </section>

      <section id="create" class="panel">
        <form id="incidentForm" class="create-form"></form>
      </section>

      <section id="accounts" class="panel"></section>

      <section id="mypage" class="panel"></section>

      <section id="notifications" class="panel"></section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button id="modalClose" class="modal-close">×</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <script src="./app.js?v=6" defer></script>
  </body>
</html>
