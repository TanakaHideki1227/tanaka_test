    <p><a href="./インシデント管理/index.html">インシデント管理ツールを開く</a></p>
    <hr />
    <p>
      <strong>Vercel の設定（重要）</strong><br />
      Project → Settings → General → <strong>Root Directory は空（リポジトリのルート）のまま</strong>にしてください。<br />
      API（<code>/api/*</code>）はリポジトリ直下の <code>api/</code> にあります。<code>インシデント管理</code> だけを Root にすると API がデプロイされずエラーになります。
